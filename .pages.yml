media: assets/images
content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{primary}.md"
    fields:
      - name: title
        label: Titre
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: image
        label: Image
        type: image
      - name: layout
        type: string
        default: "post"
        hidden: true
      - name: body
        label: Contenu
        type: rich-text